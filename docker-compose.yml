services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=tp3-cluster
    env_file: hadoop.env
    ports:
      - "9870:9870"   # UI web namenode
      - "8020:8020"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks: [tp3net]

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    depends_on: [namenode]
    env_file: hadoop.env
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    networks: [tp3net]

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    depends_on: [namenode]
    env_file: hadoop.env
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    networks: [tp3net]

  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    depends_on: [namenode]
    env_file: hadoop.env
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    networks: [tp3net]

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    env_file: hadoop.env
    networks: [tp3net]

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    depends_on: [spark-master]
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    env_file: hadoop.env
    networks: [tp3net]

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    depends_on: [spark-master]
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    env_file: hadoop.env
    networks: [tp3net]

volumes:
  namenode_data:

networks:
  tp3net: